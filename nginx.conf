server {
    listen 80;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers applied to all responses (always = includes error codes)
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;

    # Health check for k8s readiness probe (exact match, suppress access logs)
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain always;
    }

    # Block common scanner/attack probes — return 404 so bots get no signal
    # Covers: .git, .env, .vscode, WordPress paths, PHP exploits, Vite dev leaks
    location ~* (\.git/|\.env$|\.env\.|\.vscode/|\.htaccess|wp-includes|wp-admin|wp-content|wp-login\.php|xmlrpc\.php|vendor/phpunit|@vite/|/_internal/|wlwmanifest\.xml|eval-stdin\.php) {
        return 404;
    }

    # Cache-control: no-cache on index.html so clients always revalidate
    # NOTE: nginx drops parent add_header directives when a location has its own,
    # so all security headers must be repeated here.
    location = /index.html {
        add_header Cache-Control             "no-cache"                             always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|woff2)$ {
        add_header Cache-Control             "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
    }

    # Angular client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
